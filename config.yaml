triggers:
  alt_high: 700    # less than this mbar
  alt_low: 800   # greater than this mbar

devices:
  
  Labjack:
    # Labjack control
    # UCATS-B uses a T4 Labjack with 12 DIO, 4 A2D, and 2 DAC lines.
    # Digital I/O are on lines FIO0-FIO3, EIO0-EIO3, and CIO0-CIO3
    # Analog Input are on lines AIN0-AIN3
    # There are two 0-5V DACs addressed via DAC0 and DAC1
    sim_mode: false
    data_var_prefix: j_     # leave blank for no prefix
    display_vars:
      - pilot_power
      - temp1

    digouts:
      # variables used in instrument.py
      FIO6: 'pilot_wd'
      FIO4: 'sol_cal'
      FIO5: 'sol_aircal'
      FIO7: 'pumps'
      EIO4: 'power_aerisCO2'
      EIO6: 'power_aerisCO'

    digins:
      # these addresses are read every second
      CIO0: 'pilot_power'

    analog:
      # read once a second
      # The list of numbers in cal are coefficients for a polynomial.
      # [intercept, slope, quadratic, etc.]
      AIN0:
        var: 'amb_press'
        cal: [0, 1]  
      AIN1:
        var: 'pump_speed'
        cal: [0, 10, 2]
      AIN2:
        var: 'temp1'
        cal: [0, 1]

  Aeris_CO2:
    inst_num: 2   # don't change this
    serial_port: /dev/ttyUSB0
    sim_mode: false
    data_var_prefix: d1_
    display_vars:
      - T_gas
      - T_ambient
      - N2O_ppb
      - CO2_ppm

  Aeris_CO:
    inst_num: 1   # don't change this
    serial_port: /dev/ttyUSB2
    sim_mode: false
    data_var_prefix: d2_
    display_vars:
      - T_gas
      - T_ambient
      - N2O_ppb
      - CO_ppb
 
  O3_sensor:
    serial_port: /dev/ttyUSB1
    sim_mode: false
    data_var_prefix: oz_
    display_vars:
      - t
      - p
      - o3
   
  H2O_sensor:
    serial_port: /dev/ttyUSB1
    sim_mode: true
    data_var_prefix: w_
    display_vars:
      - H2O_sh
      - H2O_B
      - H2O_lg
   
