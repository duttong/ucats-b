triggers:
  pump_on: 700    # less than this mbar
  pump_off: 800   # greater than this mbar

devices:
  labjack:
    table: labjack.yaml
    sim_mode: true
    data_var_prefix: j_     # leave blank for no prefix
    pilot: 'FIO7'           # pilot light dig line
    sol_cal: 'FIO6'         # solenoid for cal or air
    display_vars:
      - amb_press
      - temp1
    
  aeris1:
    serial_port: /dev/ttyUSB3
    sim_mode: true
    data_var_prefix: d1_
    display_vars:
      - Det_Bkgd
      - Ramp_Ampl
      - N2O_ppm
      - CO_ppm

  aeris2:
    serial_port: /dev/ttyUSB2
    sim_mode: true
    data_var_prefix: d2_
    display_vars:
      - Det_Bkgd
      - Ramp_Ampl
      - N2O_ppm

  o3_sensor:
    serial_port: /dev/ttyUSB0
    sim_mode: true
    data_var_prefix: oz_
    display_vars:
      - t
      - p
      - o3

  h2o_sensor:
    serial_port: /dev/ttyUSB1
    sim_mode: true
    data_var_prefix: w_
    display_vars:
      - H2O_sh
      - H2O_B
      - H2O_lg
