triggers:
  alt_high: 700    # less than this mbar
  alt_low: 800   # greater than this mbar

devices:
  labjack:
    table: labjack.yaml
    sim_mode: true
    data_var_prefix: j_     # leave blank for no prefix

    pilot: 'FIO6'           # pilot watchdog
    pilotswitch: 'FIO7'     # pilot on/off switch
    sol_cal: 'CIO1'         # solenoid for cal1 or cal2
    sol_aircal: 'CIO2'      # solenoid for air or cal selection
    pump_aeris: 'CIO3'
    pump_o3: 'EIO0'
    pump_h2o: 'EIO2'
    power_aerisCO2: 'EIO4'
    power_aerisCO: 'EIO6'
    display_vars:
      - pump_speed
      - temp1

  aeris_CO2:
    inst_num: 1   # don't change this
    serial_port: /dev/ttyUSB2
    sim_mode: true
    data_var_prefix: d1_
    display_vars:
      - Det_Bkgd
      - Ramp_Ampl
      - N2O_ppm
      - CO2_ppm

  aeris_CO:
    inst_num: 2   # don't change this
    serial_port: /dev/ttyUSB3
    sim_mode: true
    data_var_prefix: d2_
    display_vars:
      - Det_Bkgd
      - Ramp_Ampl
      - N2O_ppm
      - CO_ppm
 
  o3_sensor:
    serial_port: /dev/ttyUSB0
    sim_mode: true
    data_var_prefix: oz_
    display_vars:
      - t
      - p
      - o3
   
  h2o_sensor:
    serial_port: /dev/ttyUSB1
    sim_mode: true
    data_var_prefix: w_
    display_vars:
      - H2O_sh
      - H2O_B
      - H2O_lg
   